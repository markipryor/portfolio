<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1D9E75">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Token Rush">
<title>Token Rush v0.4.1</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231D9E75'/><circle cx='50' cy='50' r='28' fill='none' stroke='white' stroke-width='8'/><circle cx='50' cy='50' r='10' fill='white'/></svg>">
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Token%20Rush%22,%22short_name%22:%22Token%20Rush%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23f5f5f5%22,%22theme_color%22:%22%231D9E75%22,%22orientation%22:%22portrait%22}">
<style>
:root {
  --green: #1D9E75;
  --orange: #D85A30;
  --blue: #378ADD;
  --pink: #D4537E;
  --bg: #F2F2F7;
  --card: #FFFFFF;
  --border: rgba(0,0,0,0.1);
  --text: #1C1C1E;
  --text2: #6C6C70;
  --text3: #AEAEB2;
  --radius: 12px;
  --radius-sm: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1C1C1E;
    --card: #2C2C2E;
    --border: rgba(255,255,255,0.1);
    --text: #FFFFFF;
    --text2: #AEAEB2;
    --text3: #6C6C70;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; overflow: hidden; background: var(--bg); }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: var(--text);
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  padding: 8px;
}
#tr-setup, #tr-winner { max-width: 480px; margin: 0 auto; width: 100%; }
#tr-app { display: flex; flex-direction: column; height: 100%; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 24px rgba(0,0,0,0.12); }
.tr-screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
.tr-screen.active { display: flex; }

/* ── SETUP ── */
#tr-setup { padding: 28px 20px; gap: 20px; align-items: center; overflow-y: auto; background: var(--bg); }
.tr-logo { width: 72px; height: 72px; background: var(--green); border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(29,158,117,0.35); }
.tr-logo svg { width: 44px; height: 44px; }
.tr-title-block { text-align: center; }
.tr-head { font-size: 26px; font-weight: 700; color: var(--text); }
.tr-sub { font-size: 14px; color: var(--text2); margin-top: 4px; }
.name-section { width: 100%; }
.section-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text2); margin-bottom: 8px; }
.name-input-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius-sm); }
.name-swatch { width: 18px; height: 18px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.name-input { flex: 1; font-size: 16px; color: var(--text); border: none; background: transparent; outline: none; }
.mode-section { width: 100%; }
.mode-card { width: 100%; padding: 14px 16px; background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 14px; transition: border-color .15s; }
.mode-card:last-of-type { margin-bottom: 0; }
.mode-card.sel { border-color: var(--green); background: rgba(29,158,117,.06); }
.mode-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.mode-icon.quick { background: rgba(93,202,165,.15); }
.mode-icon.medium { background: rgba(55,138,221,.15); }
.mode-icon.long { background: rgba(212,83,126,.15); }
.mode-name { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.mode-desc { font-size: 12px; color: var(--text2); line-height: 1.4; }
.start-btn { width: 100%; padding: 16px; background: var(--green); color: #fff; border: none; border-radius: var(--radius); font-size: 17px; font-weight: 600; cursor: pointer; box-shadow: 0 2px 12px rgba(29,158,117,0.3); }
.start-btn:disabled { opacity: .35; box-shadow: none; }

/* ── GAME ── */
#tr-game { position: relative; background: var(--bg); flex-direction: row !important; }
#game-left { display: flex; flex-direction: column; flex: 1; min-width: 0; }
#board-container { flex: 1; position: relative; touch-action: none; user-select: none; -webkit-user-select: none; display: flex; align-items: center; justify-content: center; overflow: hidden; min-height: 0; }
#board-svg { display: block; }
#action-strip { position: absolute; display: flex; gap: 8px; align-items: center; padding: 0 10px; background: var(--card); border-radius: 10px; border: 0.5px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.22); z-index: 5; }
.ap-msg { flex: 1; font-size: 12px; color: var(--text2); line-height: 1.3; }
#game-sidebar { display: none !important; }
.sb-section { padding: 16px; border-bottom: 0.5px solid var(--border); }
.sb-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text2); margin-bottom: 10px; }
.sb-player { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg); border-radius: 8px; margin-bottom: 6px; border: 1px solid var(--border); }
.sb-player.sb-active { border-width: 1.5px; }
.sb-player:last-child { margin-bottom: 0; }
.sb-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.sb-name { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); }
.sb-sub { font-size: 11px; color: var(--text2); }
.sb-tokens { font-size: 18px; font-weight: 700; color: var(--text); }
.sb-tokens span { font-size: 10px; font-weight: 400; color: var(--text2); }
.ap-btn { padding: 8px 14px; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.ap-btn.green { background: var(--green); color: #fff; }
.ap-btn.green:disabled { opacity: .35; }
.ap-btn.grey { background: var(--bg); color: var(--text); border: 0.5px solid var(--border); }

/* ── OVERLAY ── */
#overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,.5); z-index: 50; flex-direction: column; align-items: center; justify-content: flex-end; }
#overlay.open { display: flex; }
.osheet { background: var(--card); border-radius: 20px 20px 0 0; width: 100%; max-height: 76%; overflow-y: auto; padding: 20px 16px calc(20px + env(safe-area-inset-bottom)); }
.ohandle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.otitle { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.osub { font-size: 13px; color: var(--text2); margin-bottom: 14px; line-height: 1.5; }
.orow { display: flex; align-items: center; gap: 10px; padding: 11px 12px; background: var(--bg); border-radius: var(--radius-sm); margin-bottom: 8px; cursor: pointer; border: 1.5px solid transparent; }
.orow:active, .orow.sel { border-color: var(--green); }
.orow-name { flex: 1; font-size: 14px; color: var(--text); }
.orow-detail { font-size: 13px; color: var(--text2); }
.obtn-skip { width: 100%; padding: 11px; background: transparent; border: 0.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); font-size: 14px; cursor: pointer; margin-top: 6px; }
.pstrip { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; padding: 8px 10px; background: var(--bg); border-radius: var(--radius-sm); }
.pchip { display: flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 8px; border-radius: 99px; border: 1px solid transparent; color: var(--text2); }
.pchip.cur { font-weight: 600; border-color: currentColor; }
.pchip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ── WINNER ── */
#tr-winner { padding: 32px 20px; align-items: center; justify-content: center; gap: 14px; background: var(--bg); overflow-y: auto; }
.win-trophy { font-size: 64px; }
.win-label { font-size: 14px; color: var(--text2); }
.win-name { font-size: 32px; font-weight: 700; }
.win-tok { font-size: 15px; color: var(--text2); }
.final-card { width: 100%; background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.final-row { display: flex; align-items: center; gap: 10px; padding: 13px 16px; border-bottom: 0.5px solid var(--border); font-size: 14px; }
.final-row:last-child { border-bottom: none; }
.final-pos { width: 24px; font-size: 12px; color: var(--text2); }
.final-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.final-nm { flex: 1; font-weight: 600; color: var(--text); }
.final-sc { font-weight: 700; font-size: 16px; color: var(--text); }
.btn-row { display: flex; gap: 10px; width: 100%; }
.btn-secondary { flex: 1; padding: 14px; background: var(--card); color: var(--text); border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; }
.btn-primary { flex: 1; padding: 14px; background: var(--green); color: #fff; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<div id="tr-app">

<!-- SETUP -->
<div id="tr-setup" class="tr-screen active">
  <div class="tr-logo">
    <svg viewBox="0 0 44 44" fill="none">
      <circle cx="22" cy="22" r="15" stroke="white" stroke-width="4.5"/>
      <circle cx="22" cy="22" r="5.5" fill="white"/>
    </svg>
  </div>
  <div class="tr-title-block">
    <div class="tr-head">Token Rush</div>
    <div class="tr-sub">You vs 3 opponents · <span style="opacity:0.6">v0.4.1</span></div>
  </div>
  <div class="name-section">
    <p class="section-label">Your name</p>
    <div class="name-input-row">
      <div class="name-swatch"></div>
      <input class="name-input" id="human-name" value="Player 1" autocomplete="off" maxlength="16"/>
    </div>
  </div>
  <div class="mode-section">
    <p class="section-label">Game mode</p>
    <button class="mode-card" id="mode-quick" onclick="selectMode('quick')">
      <div class="mode-icon quick">⚡</div>
      <div>
        <div class="mode-name">Quick</div>
        <div class="mode-desc">Easy opponents · fast-paced · great for learning</div>
      </div>
    </button>
    <button class="mode-card" id="mode-medium" onclick="selectMode('medium')">
      <div class="mode-icon medium">⚔️</div>
      <div>
        <div class="mode-name">Medium</div>
        <div class="mode-desc">Smart opponents · balanced challenge · standard rules</div>
      </div>
    </button>
    <button class="mode-card" id="mode-long" onclick="selectMode('long')">
      <div class="mode-icon long">🏰</div>
      <div>
        <div class="mode-name">Long</div>
        <div class="mode-desc">Smart opponents · no passing-Start bonus · longer game</div>
      </div>
    </button>
  </div>
  <button class="start-btn" id="go-btn" onclick="startGame()" disabled>Start game</button>
</div>

<!-- GAME -->
<div id="tr-game" class="tr-screen" style="position:relative">
  <div id="game-left">
    <div id="board-container">
      <svg id="board-svg"></svg>
      <div id="action-strip">
        <div class="ap-msg" id="ap-msg">—</div>
        <button class="ap-btn grey" id="done-btn" onclick="closeRedis()" style="display:none">Done</button>
        <button class="ap-btn green" id="roll-btn" onclick="doRoll()">🎲 Roll</button>
      </div>
    </div>
  </div>
  <div id="game-sidebar">
    <div class="sb-section">
      <div class="sb-label">Current turn</div>
      <div id="sb-turn"></div>
    </div>
    <div class="sb-section" style="flex:1">
      <div class="sb-label">Players</div>
      <div id="sb-players"></div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Tokens on board</div>
      <div id="sb-tokens"></div>
    </div>
    <div style="padding:12px 16px;margin-top:auto;font-size:11px;color:var(--text3);text-align:right">v0.4.1</div>
  </div>
  <div id="overlay"><div class="osheet" id="osheet"></div></div>
</div>

<!-- WINNER -->
<div id="tr-winner" class="tr-screen">
  <div class="win-trophy" id="win-trophy">🏆</div>
  <div class="win-label" id="win-label">Winner!</div>
  <div class="win-name" id="win-name"></div>
  <div class="win-tok" id="win-tok"></div>
  <div class="final-card" id="final-card"></div>
  <div class="btn-row">
    <button class="btn-secondary" onclick="rematch()">Rematch</button>
    <button class="btn-primary" onclick="goSetup()">Menu</button>
  </div>
</div>

</div>

<script>
const COLORS = ['#1D9E75','#D85A30','#378ADD','#D4537E'];
let TOTAL = 62, COLS = 17, RCNT = 14;
const SQC = {start:'#1D9E75',token1:'#FAC775',token2:'#EF9F27',token5:'#D85A30',steal:'#85B7EB',forfeit:'#F09595',empty:null};
const CPU_NAMES = ['Alex','Jordan','Sam','Taylor','Morgan','Casey','Riley','Jamie','Avery','Quinn','Drew','Blake','Charlie','Skyler','Reese','Hayden','Peyton','Rowan','Sage','Finley','Tom','Jane','Mia','Leo','Zoe','Max','Isla','Eli','Ruby','Finn','Luna','Owen','Nora','Liam','Cora','Jake','Ivy','Seth','Bea','Joel'];

function sqLabel(t){return{start:'Start',token1:'1-tok',token2:'2-tok',token5:'5-tok',steal:'Steal',forfeit:'Forfeit',empty:'Empty'}[t]||t;}

function buildBoard(){
  const sq=Array(TOTAL).fill('empty');
  sq[0]='start';
  if(TOTAL===46){
    [2,6,10,14,25,30,37,42].forEach(i=>sq[i]='token1');
    [8,19,28,40].forEach(i=>sq[i]='token2');
    sq[16]='token5';
    [4,12,24,34,44].forEach(i=>sq[i]='steal');
    [11,27,43].forEach(i=>sq[i]='forfeit');
  } else {
    [2,5,9,13,20,27,34,35,40,47,54].forEach(i=>sq[i]='token1');
    [7,16,30,38,48,52,60].forEach(i=>sq[i]='token2');
    sq[23]='token5';
    [3,11,19,25,42,50,55,58].forEach(i=>sq[i]='steal');
    [15,33,37,61].forEach(i=>sq[i]='forfeit');
  }
  return sq;
}

function sqPos(i){
  const H=COLS, V=RCNT+2;
  if(i<COLS) return {c:i,r:0};
  if(i<COLS+RCNT) return {c:H-1,r:i-COLS+1};
  const b=i-COLS+1-RCNT;
  if(b<=COLS) return {c:H-1-(b-1),r:V-1};
  return {c:0,r:V-1-(b-COLS)};
}

let board,boardTokens,players,cur,firstCircuitDone,startTokensTaken,startT=0;
let redistMax=0,redistCb=null,redisMoveSrc=-1,redisBoardHighlight=[];
let forfeitMode=false,redisMode=false,stealMode=false,passStartCb=null;
let svgW=0,svgH=0,sqW=0,sqH=0,innerX=0,innerY=0,innerW=0,innerH=0;
let selectedMode=null,lastMode=null,lastHumanName='Player 1';

function isDesktop(){return window.innerWidth>=640;}

function renderPlayerPanel(){
  if(!players)return;
  const p=players[cur];
  const turnEl=document.getElementById('sb-turn');
  if(turnEl){
    turnEl.innerHTML=`<div style="display:flex;align-items:center;gap:8px"><div style="width:12px;height:12px;border-radius:50%;background:${p.color}"></div><span style="font-weight:600;font-size:15px;color:var(--text)">${p.name}</span></div>`;
  }
  const playersEl=document.getElementById('sb-players');
  if(playersEl){
    playersEl.innerHTML=players.map((pl,i)=>`<div class="sb-player${i===cur?' sb-active':''}" style="${i===cur?`border-color:${pl.color}`:''}"><div class="sb-dot" style="background:${pl.color}"></div><div style="flex:1"><div class="sb-name">${pl.name}${pl.type==='human'?' <span style="font-size:10px;font-weight:400;color:var(--text3)">(you)</span>':''}</div><div class="sb-sub">sq ${pl.pos} · ${sqLabel(board[pl.pos])}</div></div><div><div class="sb-tokens">${pl.tokens} <span>tok</span></div></div></div>`).join('');
  }
  const tokEl=document.getElementById('sb-tokens');
  if(tokEl){
    const btbN=btbTotal();
    const btbColor=btbN===0?'#D85A30':btbN<=Math.floor(startT*0.3)?'#EF9F27':'#1D9E75';
    tokEl.innerHTML=`<span style="font-size:28px;font-weight:700;color:${btbColor}">${btbN}</span> <span style="font-size:13px;color:var(--text2)">of ${startT} remaining</span>`;
  }
}

function selectMode(m){
  selectedMode=m;
  document.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('sel'));
  document.getElementById('mode-'+m).classList.add('sel');
  document.getElementById('go-btn').disabled=false;
}

function pickCpuNames(n){
  const pool=[...CPU_NAMES];
  const picked=[];
  for(let i=0;i<n;i++){const idx=Math.floor(Math.random()*pool.length);picked.push(pool.splice(idx,1)[0]);}
  return picked;
}

function startGame(){
  if(!selectedMode)return;
  lastMode=selectedMode;
  lastHumanName=document.getElementById('human-name').value.trim()||'Player 1';
  launchGame(lastMode,lastHumanName);
}

function rematch(){launchGame(lastMode,lastHumanName);}

function launchGame(mode,humanName){
  if(mode==='quick'){TOTAL=46;COLS=13;RCNT=10;}else{TOTAL=62;COLS=17;RCNT=14;}
  board=buildBoard();
  boardTokens=board.map(t=>t==='token1'?1:t==='token2'?2:t==='token5'?5:t==='start'?3:0);
  startT=boardTokens.reduce((s,t,i)=>(board[i]==='token1'||board[i]==='token2'||board[i]==='token5')?s+t:s,0);
  const cpuDiff=mode==='quick'?'easy':'smart';
  const cpuNames=pickCpuNames(3);
  players=[
    {name:humanName,color:COLORS[0],pos:0,tokens:2,type:'human'},
    {name:cpuNames[0],color:COLORS[1],pos:0,tokens:2,type:cpuDiff},
    {name:cpuNames[1],color:COLORS[2],pos:0,tokens:2,type:cpuDiff},
    {name:cpuNames[2],color:COLORS[3],pos:0,tokens:2,type:cpuDiff},
  ];
  firstCircuitDone=Array(4).fill(false);
  startTokensTaken=false;
  redistMax=0;redistCb=null;redisMoveSrc=-1;redisBoardHighlight=[];
  forfeitMode=false;redisMode=false;stealMode=false;passStartCb=null;
  const rolls=players.map(()=>Math.ceil(Math.random()*6));
  let mx=-1,fi=0;rolls.forEach((r,i)=>{if(r>mx){mx=r;fi=i;}});
  cur=fi;
  goScreen('tr-game');
  layoutBoard();drawBoard();
  setMsg(`${players[fi].name} rolled highest (${rolls[fi]}) — goes first!`);
  resetRoll();
  if(players[cur].type!=='human'){
    document.getElementById('roll-btn').style.display='none';
    setTimeout(doCpuTurn,700);
  }
}

function goSetup(){goScreen('tr-setup');}
function goScreen(id){
  document.querySelectorAll('.tr-screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function layoutBoard(){
  const cont=document.getElementById('board-container');
  const availW=cont.clientWidth;
  const availH=cont.clientHeight;
  const sqWfromW=Math.floor(availW/COLS);
  const sqWfromH=Math.floor(availH/(RCNT+2));
  sqW=Math.min(sqWfromW,sqWfromH);sqH=sqW;
  svgW=sqW*COLS;svgH=sqH*(RCNT+2);
  innerX=sqW;innerY=sqH;innerW=sqW*(COLS-2);innerH=sqH*RCNT;
  const svg=document.getElementById('board-svg');
  svg.setAttribute('viewBox',`0 0 ${svgW} ${svgH}`);
  svg.style.width=svgW+'px';
  svg.style.height=svgH+'px';
  positionActionStrip();
}

function positionActionStrip(){
  const strip=document.getElementById('action-strip');
  const cont=document.getElementById('board-container');
  if(!strip||!sqW)return;
  const contW=cont.clientWidth,contH=cont.clientHeight;
  const svgOffX=Math.max(0,(contW-svgW)/2);
  const svgOffY=Math.max(0,(contH-svgH)/2);
  const stripH=Math.max(34,Math.min(44,sqH*1.5));
  const margin=sqW*0.5;
  strip.style.left=(svgOffX+innerX+margin)+'px';
  strip.style.width=(innerW-margin*2)+'px';
  strip.style.top=(svgOffY+sqH*(RCNT+1)-stripH-4)+'px';
  strip.style.height=stripH+'px';
}

function cellXY(c,r){return{x:c*sqW,y:r*sqH};}
function sqXY(i){const{c,r}=sqPos(i);return cellXY(c,r);}
function isDark(){return window.matchMedia('(prefers-color-scheme:dark)').matches;}

function drawBoard(){
  layoutBoard();
  const svg=document.getElementById('board-svg');
  const ns='http://www.w3.org/2000/svg';
  svg.innerHTML='';

  // Defs: drop-shadow filter + square gradients
  const defs=document.createElementNS(ns,'defs');
  const filt=document.createElementNS(ns,'filter');
  filt.setAttribute('id','tshadow');filt.setAttribute('x','-40%');filt.setAttribute('y','-40%');
  filt.setAttribute('width','180%');filt.setAttribute('height','180%');
  const fds=document.createElementNS(ns,'feDropShadow');
  fds.setAttribute('dx','0');fds.setAttribute('dy','1.5');fds.setAttribute('stdDeviation','2');
  fds.setAttribute('flood-color','rgba(0,0,0,0.5)');
  filt.appendChild(fds);defs.appendChild(filt);
  const GRADS={
    token1:['#FFE0A0','#E8921A'],token2:['#FFC050','#C06808'],

    src:['#7EDEC0','#2AAA88'],

    const btbLab=document.createElementNS(ns,'text');
    btbLab.setAttribute('x',cx);btbLab.setAttribute('y',cy+circR*0.48);

  const frame=document.createElementNS(ns,'rect');
  frame.setAttribute('x',0.5);frame.setAttribute('y',0.5);

  for(let i=0;i<TOTAL;i++){
    const{x,y}=sqXY(i);
    const type=board[i],tok=boardTokens?boardTokens[i]:0;

    // Square background

    else rect.setAttribute('fill',isDark()?'#252525':'#d6d6d6');

    // Shine highlight on colored squares

    // Tap overlay for interactive modes

      const tap=document.createElementNS(ns,'rect');

      tap.setAttribute('width',sqW);tap.setAttribute('height',sqH);
      tap.setAttribute('fill','transparent');tap.style.cursor='pointer';
      tap.addEventListener('click',()=>onBoardTap(i));

    // Square content
    const cx2=x+sqW/2,cy2=y+sqH/2;
    if(type==='start'){
      const t=document.createElementNS(ns,'text');

  ibframe.setAttribute('width',innerW);ibframe.setAttribute('height',innerH);

  ibframe.setAttribute('stroke-width',1);svg.appendChild(ibframe);

    players.forEach((p,pi)=>{if(!byPos[p.pos])byPos[p.pos]=[];byPos[p.pos].push(pi);});
    Object.entries(byPos).forEach(([pos,pis])=>{
      const{x,y}=sqXY(parseInt(pos));
      pis.forEach((pi,off)=>{
        const ox=(off-(pis.length-1)/2)*(sqW*0.3);
        if(pi===cur){
          const outerR=document.createElementNS(ns,'circle');
          outerR.setAttribute('cx',x+sqW/2+ox);outerR.setAttribute('cy',y+sqH*0.68);
          outerR.setAttribute('r',sqW*0.34);outerR.setAttribute('fill','none');
          outerR.setAttribute('stroke',players[pi].color);outerR.setAttribute('stroke-width',1);
          outerR.setAttribute('opacity','0.4');svg.appendChild(outerR);
          const ring=document.createElementNS(ns,'circle');
          ring.setAttribute('cx',x+sqW/2+ox);ring.setAttribute('cy',y+sqH*0.68);
          ring.setAttribute('r',sqW*0.27);ring.setAttribute('fill','none');

          svg.appendChild(ring);

        c.setAttribute('cx',x+sqW/2+ox);c.setAttribute('cy',y+sqH*0.68);
        c.setAttribute('r',sqW*0.21);c.setAttribute('fill',players[pi].color);

        c.setAttribute('filter','url(#tshadow)');

        const init=document.createElementNS(ns,'text');
        init.setAttribute('x',x+sqW/2+ox);init.setAttribute('cy',y+sqH*0.68);
        init.setAttribute('y',y+sqH*0.68);

  }
}

function drawPlayerCorners(svg,ns){
  const stripH=Math.max(34,Math.min(44,sqH*1.5));
  const cardH=Math.max(sqH*0.85,Math.min(sqH*1.3,innerH*0.2));
  const cardW=Math.min(innerW*0.36,sqW*3.2);
  const padX=sqW*0.35,padY=sqH*0.25;
  const botY=innerY+innerH-stripH-8-cardH;
  const positions=[
    {x:innerX+padX, y:innerY+padY, pi:0},
    {x:innerX+innerW-padX-cardW, y:innerY+padY, pi:1},
    {x:innerX+padX, y:botY, pi:2},
    {x:innerX+innerW-padX-cardW, y:botY, pi:3},
  ];
  positions.forEach(({x,y,pi})=>{
    const pl=players[pi];
    if(!pl)return;
    const isActive=pi===cur;
    const isStealTarget=stealMode&&pi!==cur&&pl.tokens>0;
    // Active player outer glow
    if(isActive){
      const glow=document.createElementNS(ns,'rect');
      glow.setAttribute('x',x-3);glow.setAttribute('y',y-3);
      glow.setAttribute('width',cardW+6);glow.setAttribute('height',cardH+6);
      glow.setAttribute('rx',8);glow.setAttribute('fill','none');
      glow.setAttribute('stroke',pl.color);glow.setAttribute('stroke-width',1.5);
      glow.setAttribute('opacity','0.35');svg.appendChild(glow);
    }
    const bg=document.createElementNS(ns,'rect');
    bg.setAttribute('x',x);bg.setAttribute('y',y);
    bg.setAttribute('width',cardW);bg.setAttribute('height',cardH);
    bg.setAttribute('rx',6);
    bg.setAttribute('fill',isActive?(isDark()?'rgba(0,0,0,0.7)':'rgba(255,255,255,0.88)'):(isDark()?'rgba(0,0,0,0.5)':'rgba(255,255,255,0.7)'));
    if(isActive){bg.setAttribute('stroke',pl.color);bg.setAttribute('stroke-width',1.5);}
    else if(isStealTarget){bg.setAttribute('stroke','#FFC050');bg.setAttribute('stroke-width',2);}
    else{bg.setAttribute('stroke',isDark()?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.09)');bg.setAttribute('stroke-width',0.5);}
    svg.appendChild(bg);
    // Color bar on left edge
    const bar=document.createElementNS(ns,'rect');
    bar.setAttribute('x',x);bar.setAttribute('y',y);
    bar.setAttribute('width',3);bar.setAttribute('height',cardH);
    bar.setAttribute('rx',3);bar.setAttribute('fill',pl.color);svg.appendChild(bar);
    const dotR=Math.max(3,sqW*0.09);
    const dotX=x+3+dotR+sqW*0.1,dotY=y+cardH/2;
    const dot=document.createElementNS(ns,'circle');
    dot.setAttribute('cx',dotX);dot.setAttribute('cy',dotY);
    dot.setAttribute('r',dotR);dot.setAttribute('fill',pl.color);svg.appendChild(dot);
    const nm=document.createElementNS(ns,'text');
    nm.setAttribute('x',dotX+dotR+sqW*0.1);nm.setAttribute('y',y+cardH*0.42);
    nm.setAttribute('dominant-baseline','middle');nm.setAttribute('font-size',Math.max(8,sqW*0.175));
    nm.setAttribute('font-weight',isActive?'700':'600');
    nm.setAttribute('fill',isActive?(isDark()?'rgba(255,255,255,0.95)':'rgba(0,0,0,0.9)'):(isDark()?'rgba(255,255,255,0.75)':'rgba(0,0,0,0.65)'));
    nm.textContent=pl.name.length>7?pl.name.slice(0,6)+'…':pl.name;svg.appendChild(nm);
    const tok=document.createElementNS(ns,'text');
    tok.setAttribute('x',x+cardW-sqW*0.1);tok.setAttribute('y',y+cardH*0.55);
    tok.setAttribute('text-anchor','end');tok.setAttribute('dominant-baseline','middle');
    tok.setAttribute('font-size',Math.max(9,sqW*0.28));tok.setAttribute('font-weight','800');
    tok.setAttribute('fill',isActive?pl.color:(isDark()?'rgba(255,255,255,0.88)':'rgba(0,0,0,0.8)'));
    tok.textContent=pl.tokens;svg.appendChild(tok);
    if(isStealTarget){
      // Steal hint label
      const hint=document.createElementNS(ns,'text');
      hint.setAttribute('x',x+cardW/2);hint.setAttribute('y',y-sqH*0.08);
      hint.setAttribute('text-anchor','middle');hint.setAttribute('dominant-baseline','middle');
      hint.setAttribute('font-size',Math.max(6,sqW*0.13));hint.setAttribute('font-weight','600');
      hint.setAttribute('fill','#FFC050');hint.textContent='TAP TO STEAL';svg.appendChild(hint);
    }
    if(isStealTarget){
      const hit=document.createElementNS(ns,'rect');
      hit.setAttribute('x',x);hit.setAttribute('y',y);

      hit.setAttribute('fill','transparent');hit.style.cursor='pointer';
      hit.addEventListener('click',()=>doSteal(pi));
      hit.addEventListener('touchend',(e)=>{e.preventDefault();doSteal(pi);});
      svg.appendChild(hit);
    }
  });
}

function btbTotal(){return(boardTokens||[]).reduce((s,t,i)=>(board[i]==='token1'||board[i]==='token2'||board[i]==='token5')?s+t:s,0);}
function setMsg(m){document.getElementById('ap-msg').textContent=m;}
function resetRoll(){
  document.getElementById('roll-btn').style.display='block';
  document.getElementById('roll-btn').disabled=false;
}
function posStrip(){
  return players.map((p,i)=>`<div class="pchip${i===cur?' cur':''}" style="color:${p.color}"><div class="pchip-dot" style="background:${p.color}"></div>${p.name}<span style="font-size:9px;padding:1px 4px;border-radius:3px;margin-left:2px;background:${(SQC[board[p.pos]]||'#888')}22;color:${SQC[board[p.pos]]||'#888'}">sq${p.pos}</span></div>`).join('');
}
function openSheet(html){document.getElementById('osheet').innerHTML=html;document.getElementById('overlay').classList.add('open');}
function closeSheet(){
  document.getElementById('overlay').classList.remove('open');
  forfeitMode=false;redisMode=false;redisBoardHighlight=[];redisMoveSrc=-1;
  drawBoard();
}

function doRoll(){
  document.getElementById('roll-btn').disabled=true;
  const roll=Math.ceil(Math.random()*6);
  const p=players[cur];
  const old=p.pos;
  p.pos=(old+roll)%TOTAL;
  const wrap=(p.pos<old&&old!==0)||(old!==0&&p.pos===0);
  if(wrap){
    if(!firstCircuitDone[cur]){
      firstCircuitDone[cur]=true;
      if(!startTokensTaken&&boardTokens[0]>0){
        const t=boardTokens[0];p.tokens+=t;boardTokens[0]=0;startTokensTaken=true;
        drawBoard();
        setMsg(`${p.name} rolled ${roll} — completed first circuit! Collected ${t} tokens from Start.`);
        setTimeout(()=>resolveSquare(board[p.pos],p.pos,roll,p),400);return;
      }
      setMsg(`${p.name} rolled ${roll} — completed first circuit.`);
      resolveSquare(board[p.pos],p.pos,roll,p);
    } else {
      drawBoard();
      setMsg(`${p.name} rolled ${roll} — passed Start.`);
      if(lastMode==='long'){
        resolveSquare(board[p.pos],p.pos,roll,p);
      } else if(p.type!=='human'){
        cpuPassStart(()=>resolveSquare(board[p.pos],p.pos,roll,p),p.type);
      } else {
        openPassStart(()=>resolveSquare(board[p.pos],p.pos,roll,p));
      }
    }
    return;
  }
  resolveSquare(board[p.pos],p.pos,roll,p);
}

function resolveSquare(sqType,pos,roll,p){
  drawBoard();
  const isCpu=p.type!=='human';
  if(sqType==='token1'||sqType==='token2'){
    const t=boardTokens[pos],needed=sqType==='token1'?1:2;
    if(t>0){
      p.tokens+=t;boardTokens[pos]=0;
      setMsg(`${p.name} rolled ${roll} → collected ${t} token${t>1?'s':''}!`);
      drawBoard();afterAction();
    } else if(!startTokensTaken){
      setMsg(`${p.name} rolled ${roll} → empty square. Redistribution locked until Start tokens claimed.`);
      afterAction();
    } else {
      setMsg(`${p.name} rolled ${roll} → empty ${sqLabel(sqType)} square. Redistribute ${needed} token${needed>1?'s':''}.`);
      if(isCpu)cpuRedistribute(pos,needed,afterAction,p.type);
      else openRedistribute(pos,needed,afterAction);
    }
    return;
  }
  if(sqType==='token5'){
    const t=boardTokens[pos];
    if(t>0){
      p.tokens+=t;boardTokens[pos]=0;
      setMsg(`${p.name} rolled ${roll} → collected 5 tokens!`);
      drawBoard();afterAction();
    } else if(!startTokensTaken){
      setMsg(`${p.name} rolled ${roll} → empty 5-token square. Redistribution locked.`);
      afterAction();
    } else {
      setMsg(`${p.name} rolled ${roll} → empty 5-token square. Redistribute up to 5 tokens.`);
      if(isCpu)cpuRedistribute(pos,5,afterAction,p.type);
      else openRedistribute(pos,5,afterAction);
    }
    return;
  }
  if(sqType==='steal'){
    setMsg(`${p.name} rolled ${roll} → Steal!`);
    if(isCpu)cpuSteal(p.type);else openSteal();return;
  }
  if(sqType==='forfeit'){
    setMsg(`${p.name} rolled ${roll} → Forfeit.`);
    if(isCpu)cpuForfeit(p.type);else openForfeit();return;
  }
  setMsg(`${p.name} rolled ${roll} → ${sqType==='start'?'Start square.':'empty square.'}`);
  afterAction();
}

function afterAction(){
  drawBoard();
  if(checkEnd())return;
  setTimeout(nextTurn,800);
}

function nextTurn(){
  if(checkEnd())return;
  cur=(cur+1)%4;
  setMsg(`${players[cur].name}'s turn.`);
  drawBoard();resetRoll();
  if(players[cur].type!=='human'){
    document.getElementById('roll-btn').style.display='none';
    setTimeout(doCpuTurn,400);
  }
}

function checkEnd(){
  const any=boardTokens.some((t,i)=>(board[i]==='token1'||board[i]==='token2'||board[i]==='token5')&&t>0);
  if(!any){showWinner();return true;}return false;
}

function doCpuTurn(){setMsg(`${players[cur].name} is thinking...`);setTimeout(doRoll,300);}

function cpuSteal(diff){
  const p=players[cur];
  const el=players.filter((_,i)=>i!==cur&&players[i].tokens>0);
  if(el.length){
    let target;
    if(diff==='smart'){el.sort((a,b)=>b.tokens-a.tokens);target=el[0];}
    else{target=el[Math.floor(Math.random()*el.length)];}
    target.tokens--;p.tokens++;
    setMsg(`${p.name} stole 1 token from ${target.name}!`);
  } else {
    setMsg(`${p.name} landed on Steal — no one has tokens.`);
  }
  drawBoard();afterAction();
}

function cpuForfeit(diff){
  const p=players[cur];
  const opts=[];
  board.forEach((t,i)=>{if((t==='token1'||t==='token2')&&boardTokens[i]===0){const cost=t==='token1'?1:2;if(cost<=p.tokens)opts.push({idx:i,cost});}});
  if(opts.length){
    let pick;
    if(diff==='smart'){opts.sort((a,b)=>a.cost-b.cost);pick=opts[0];}
    else{pick=opts[Math.floor(Math.random()*opts.length)];}
    p.tokens-=pick.cost;boardTokens[pick.idx]=pick.cost;
    setMsg(`${p.name} forfeited ${pick.cost} token${pick.cost>1?'s':''} to square ${pick.idx}.`);
  } else {
    setMsg(`${p.name} landed on Forfeit — can't fill any square.`);
  }
  drawBoard();afterAction();
}

function cpuRedistribute(landedSq,budget,cb,diff){
  const pos=players[cur].pos;
  let remaining=budget,moves=0;
  const maxAttempts=diff==='smart'?10:1;
  for(let a=0;a<maxAttempts&&remaining>0;a++){
    const filled=[];board.forEach((t,i)=>{if((t==='token1'||t==='token2')&&boardTokens[i]>0&&i!==pos)filled.push({idx:i,tok:boardTokens[i]});});
    const empty=[];board.forEach((t,i)=>{if((t==='token1'||t==='token2')&&boardTokens[i]===0&&i!==pos)empty.push({idx:i,needed:t==='token1'?1:2});});
    const pairs=[];filled.forEach(f=>{empty.forEach(d=>{if(f.tok===d.needed&&d.needed<=remaining)pairs.push({f,d,val:f.tok});});});
    if(!pairs.length)break;
    if(diff==='smart')pairs.sort((a,b)=>b.val-a.val);
    const pick=diff==='smart'?pairs[0]:pairs[Math.floor(Math.random()*pairs.length)];
    boardTokens[pick.d.idx]=boardTokens[pick.f.idx];boardTokens[pick.f.idx]=0;
    remaining-=pick.f.tok;moves++;
  }
  setMsg(`${players[cur].name} redistributed (${moves} move${moves!==1?'s':''}).`);
  drawBoard();cb();
}

function cpuPassStart(cb,diff){
  const opts=[];board.forEach((t,i)=>{if((t==='token1'||t==='token2')&&boardTokens[i]>0)opts.push({idx:i,tokens:boardTokens[i]});});
  if(opts.length){
    let pick;
    if(diff==='smart'){opts.sort((a,b)=>b.tokens-a.tokens);pick=opts[0];}
    else{pick=opts[Math.floor(Math.random()*opts.length)];}
    players[cur].tokens+=pick.tokens;boardTokens[pick.idx]=0;
    setMsg(`${players[cur].name} collected ${pick.tokens} token${pick.tokens>1?'s':''} from square ${pick.idx} (passed Start).`);
    drawBoard();
  }
  setTimeout(cb,200);
}

function openPassStart(cb){
  passStartCb=cb;
  const opts=[];board.forEach((t,i)=>{if((t==='token1'||t==='token2')&&boardTokens[i]>0)opts.push({idx:i,type:t,tokens:boardTokens[i]});});
  const rows=opts.length?opts.map(s=>`<div class="orow" onclick='doPassStart(${JSON.stringify(s)})'><span class="orow-name">Square ${s.idx} <span style="font-size:11px;color:var(--text2)">(${sqLabel(s.type)})</span></span><span class="orow-detail">${s.tokens} token${s.tokens>1?'s':''}</span></div>`).join(''):'<p style="font-size:13px;color:var(--text2)">No filled squares available.</p>';
  openSheet(`<div class="ohandle"></div><p class="otitle">Passed Start! 🌟</p><p class="osub">Choose any filled 1 or 2-token square to collect from.</p>${rows}<button class="obtn-skip" onclick="skipPassStart()">Skip</button>`);
}
function doPassStart(s){players[cur].tokens+=s.tokens;boardTokens[s.idx]=0;closeSheet();setMsg(`You collected ${s.tokens} token${s.tokens>1?'s':''} from square ${s.idx}.`);drawBoard();if(passStartCb)passStartCb();}
function skipPassStart(){closeSheet();if(passStartCb)passStartCb();}

function openSteal(){
  const el=players.filter((_,i)=>i!==cur&&players[i].tokens>0);
  if(!el.length){setMsg(`${players[cur].name} landed on Steal — no one has tokens.`);afterAction();return;}
  stealMode=true;drawBoard();
  setMsg(`Steal — tap a player in the corner to steal 1 token`);
}
function doSteal(idx){
  stealMode=false;
  players[idx].tokens--;players[cur].tokens++;
  setMsg(`You stole 1 token from ${players[idx].name}!`);
  drawBoard();afterAction();
}

function openForfeit(){
  const p=players[cur];
  const opts=[];board.forEach((t,i)=>{if((t==='token1'||t==='token2')&&boardTokens[i]===0){const cost=t==='token1'?1:2;if(cost<=p.tokens)opts.push({idx:i,type:t,cost});}});
  if(!opts.length){setMsg(`Forfeit — no squares to fill.`);afterAction();return;}
  forfeitMode=true;redisBoardHighlight=opts.map(o=>o.idx);
  setMsg(`Forfeit — tap a highlighted square on the board to place tokens (you have ${p.tokens})`);
  drawBoard();
}
function onBoardTap(i){
  if(forfeitMode){
    const p=players[cur],t=board[i];
    if((t==='token1'||t==='token2')&&boardTokens[i]===0){const cost=t==='token1'?1:2;if(cost<=p.tokens){doForfeit({idx:i,type:t,cost});return;}}
  }
  if(redisMode){
    if(redisMoveSrc<0){
      const t=board[i];
      if((t==='token1'||t==='token2')&&boardTokens[i]>0&&i!==players[cur].pos){
        redisMoveSrc=i;
        const needed=boardTokens[i];
        redisBoardHighlight=[];
        board.forEach((bt,bi)=>{if((bt==='token1'||bt==='token2')&&boardTokens[bi]===0&&bi!==players[cur].pos&&bi!==i){const dn=bt==='token1'?1:2;if(dn===needed&&dn<=redistMax)redisBoardHighlight.push(bi);}});
        drawBoard();updateRedisMsg();
      }
    } else {
      if(redisBoardHighlight.includes(i)){
        const moved=boardTokens[redisMoveSrc];
        boardTokens[i]=moved;boardTokens[redisMoveSrc]=0;
        redistMax-=moved;redisMoveSrc=-1;redisBoardHighlight=[];
        if(redistMax<=0){closeRedis();return;}
        const newSources=[];board.forEach((t,bi)=>{if((t==='token1'||t==='token2')&&boardTokens[bi]>0&&bi!==players[cur].pos)newSources.push(bi);});
        if(!newSources.length){closeRedis();return;}
        redisBoardHighlight=newSources;
        drawBoard();updateRedisMsg();
      } else if((board[i]==='token1'||board[i]==='token2')&&boardTokens[i]>0&&i!==players[cur].pos){
        redisMoveSrc=-1;redisBoardHighlight=[];drawBoard();updateRedisMsg();onBoardTap(i);
      }
    }
  }
}
function doForfeit(s){
  players[cur].tokens-=s.cost;boardTokens[s.idx]=s.cost;
  forfeitMode=false;redisBoardHighlight=[];
  setMsg(`You placed ${s.cost} token${s.cost>1?'s':''} on square ${s.idx}.`);
  drawBoard();afterAction();
}

function openRedistribute(landedSq,maxTok,cb){
  redistMax=maxTok;redistCb=cb;redisMoveSrc=-1;redisBoardHighlight=[];redisMode=true;
  const sources=[];board.forEach((t,i)=>{if((t==='token1'||t==='token2')&&boardTokens[i]>0&&i!==players[cur].pos)sources.push(i);});
  redisBoardHighlight=sources;
  document.getElementById('done-btn').style.display='block';
  drawBoard();updateRedisMsg();
}
function updateRedisMsg(){
  const msg=redisMoveSrc<0
    ?`Redistribute — tap a highlighted square to pick up (budget: ${redistMax})`
    :`Square ${redisMoveSrc} selected — tap a green square to drop tokens`;
  setMsg(msg);
}
function closeRedis(){
  redisMode=false;redisMoveSrc=-1;redisBoardHighlight=[];
  document.getElementById('done-btn').style.display='none';
  drawBoard();if(redistCb)redistCb();
}

function showWinner(){
  const sorted=[...players].sort((a,b)=>b.tokens-a.tokens);
  const w=sorted[0];
  const humanWon=w.type==='human';
  document.getElementById('win-trophy').textContent=humanWon?'🏆':'😅';
  document.getElementById('win-label').textContent=humanWon?'You won!':'You lost!';
  document.getElementById('win-name').textContent=w.name;
  document.getElementById('win-name').style.color=w.color;
  document.getElementById('win-tok').textContent=`${w.tokens} tokens`;
  const medals=['🥇','🥈','🥉','4️⃣'];
  document.getElementById('final-card').innerHTML=sorted.map((p,i)=>`<div class="final-row"><span class="final-pos">${medals[i]}</span><div class="final-dot" style="background:${p.color}"></div><span class="final-nm">${p.name}${p.type==='human'?' (you)':''}</span><span class="final-sc">${p.tokens}</span></div>`).join('');
  goScreen('tr-winner');
}

window.addEventListener('resize',()=>{
  if(document.getElementById('tr-game').classList.contains('active')){layoutBoard();drawBoard();}
});

if('serviceWorker' in navigator){
  const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))));`;
  const blob=new Blob([sw],{type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
